<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Use - Ephemeral Lifecycle Monitor</title>
    <style>
        :root {
            --bg-color: #09090b;
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #10b981; /* Emerald green for active */
            --danger: #ef4444; /* Red for termination */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #18181b, #09090b);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            margin-bottom: 40px;
        }

        h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.025em; margin: 0 0 8px 0; }
        p { color: var(--text-muted); margin: 0; font-size: 0.95rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .metric-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
        .metric-value { font-size: 2.5rem; font-weight: 600; font-variant-numeric: tabular-nums; }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            background: #fafafa;
            color: #09090b;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }

        /* Process Table */
        .process-list {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
        }

        .process-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            padding: 16px 24px;
            border-bottom: 1px solid var(--glass-border);
            align-items: center;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }

        .process-row:last-child { border-bottom: none; }
        .process-header { background: rgba(0,0,0,0.2); font-weight: 500; color: var(--text-muted); }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge.running { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge.terminated { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge.completed { background: rgba(161, 161, 170, 0.1); color: var(--text-muted); border: 1px solid rgba(161, 161, 170, 0.2); }

        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; color: #d4d4d8; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width linear;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>tu Daemon Orchestrator</h1>
        <p>Decoupled system monitor for ephemeral agent teardowns.</p>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="metric-title">Active Daemons</div>
            <div class="metric-value" id="active-count">0</div>
        </div>
        <div class="card">
            <div class="metric-title">Zombies Prevented</div>
            <div class="metric-value" id="zombie-count">0</div>
        </div>
        <div class="card">
            <div class="metric-title">Compute Saved (Est)</div>
            <div class="metric-value" id="compute-saved">0h</div>
        </div>
    </div>

    <div class="controls">
        <h2 style="font-size: 1.1rem; font-weight: 500; margin:0;">Active Sessions</h2>
        <button onclick="spawnAgent()">+ Spawn Agent Task</button>
    </div>

    <div class="process-list">
        <div class="process-row process-header">
            <div>Session ID</div>
            <div>Agent Process</div>
            <div>Agent Status</div>
            <div>tu Daemon State</div>
        </div>
        <div id="process-container">
            </div>
    </div>

    <script>
        let activeDaemons = 0;
        let zombiesPrevented = 0;
        let computeSavedHours = 0;

        function updateMetrics() {
            document.getElementById('active-count').innerText = activeDaemons;
            document.getElementById('zombie-count').innerText = zombiesPrevented;
            document.getElementById('compute-saved').innerText = computeSavedHours + "h";
        }

        function spawnAgent() {
            const container = document.getElementById('process-container');
            const sessionId = 'session_' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            const executionTime = Math.floor(Math.random() * 4000) + 3000; // 3 to 7 seconds

            activeDaemons++;
            updateMetrics();

            // Create Row
            const row = document.createElement('div');
            row.className = 'process-row';
            row.innerHTML = `
                <div class="mono">${sessionId}</div>
                <div>
                    <span class="mono">python run_coder.py</span>
                    <div class="progress-bar"><div class="progress-fill" style="transition-duration: ${executionTime}ms"></div></div>
                </div>
                <div><span class="badge running">Executing</span></div>
                <div><span class="badge running">Mounted (PID: ${Math.floor(Math.random() * 90000) + 10000})</span></div>
            `;
            
            // Prepend so newest is on top
            container.insertBefore(row, container.firstChild);

            // Start Progress Animation
            setTimeout(() => {
                row.querySelector('.progress-fill').style.width = '100%';
            }, 50);

            // Simulate Agent Completion & Sidecar Intercept
            setTimeout(() => {
                // Agent finishes
                row.children[2].innerHTML = '<span class="badge completed">Completed</span>';
                row.querySelector('.progress-fill').style.background = 'var(--text-muted)';
                
                // --- THE CORE VALUE PROP VISUALIZED ---
                // Wait 400ms to simulate the monitor detecting the exit, then kill the daemon
                setTimeout(() => {
                    row.children[3].innerHTML = '<span class="badge terminated">SIGTERM via Sidecar</span>';
                    row.style.backgroundColor = 'rgba(239, 68, 68, 0.05)';
                    
                    activeDaemons--;
                    zombiesPrevented++;
                    computeSavedHours += 8; // 8 hours saved per prevented zombie
                    updateMetrics();
                }, 400);

            }, executionTime);
        }
    </script>
</body>
</html>
